apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Plain manifests are never edited by CI — only the image tag below changes.
resources:
  - helloworld-web.yaml

# `kustomize edit set image` (run by TeamCity) rewrites newTag on each build.
# `name` must match the image in helloworld-web.yaml (name portion, before the tag).
images:
  - name: impatspence/helloworld_web
    newTag: "18"
